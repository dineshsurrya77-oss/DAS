<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Destiny | A Cinematic Journey</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --blush: #ffafbd;
            --rose: #ff3e6c;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.15);
            --vignette: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.4) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; background: #050505;
            font-family: 'Montserrat', sans-serif; color: white;
        }

        /* --- BACKGROUND LAYERS --- */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--vignette); z-index: 5; pointer-events: none; }
        
        /* --- CURSOR SYSTEM --- */
        #cursor-wrap { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 10000; }
        #heart-cursor {
            width: 30px; height: 30px; fill: var(--rose);
            transform: translate(-50%, -50%);
            animation: pump 0.8s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
            filter: drop-shadow(0 0 10px var(--rose));
        }
        @keyframes pump {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            15% { transform: translate(-50%, -50%) scale(1.3); }
        }
        .trail-emoji { position: fixed; pointer-events: none; font-size: 24px; z-index: 9999; pointer-events: none; }

        /* --- PHASE WRAPPERS --- */
        .phase {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; text-align: center;
            padding: 20px;
        }
        .active { display: flex; animation: fadeIn 2s forwards; }

        @keyframes fadeIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        /* --- BUTTONS --- */
        .btn {
            padding: 15px 40px; font-size: 1.2rem; border-radius: 50px;
            border: none; cursor: pointer; transition: 0.4s; font-family: 'Cinzel', serif;
            letter-spacing: 2px; text-transform: uppercase; margin: 15px;
            background: var(--glass); color: white; border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }
        .btn:hover { background: white; color: var(--rose); transform: scale(1.1); }
        .btn-primary { background: var(--rose); border: none; box-shadow: 0 0 20px rgba(255, 62, 108, 0.5); }

        /* --- RING SCENE --- */
        #ring-ui { 
            width: 400px; height: 400px; position: relative; 
            display: flex; justify-content: center; align-items: center;
        }
        #ring-content { position: absolute; width: 220px; z-index: 20; }

        /* --- NO BUTTON LOGIC --- */
        #no-btn { position: absolute; transition: 0.2s ease-out; }

        /* --- GLASS CARD --- */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(25px);
            padding: 50px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); max-width: 500px;
        }

        /* --- CINEMATIC TEXT --- */
        .cine-text { font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: white; opacity: 0; }
        .show-text { animation: textAnim 4s forwards; }
        @keyframes textAnim { 0% { opacity: 0; transform: translateY(20px); } 20%, 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }

        /* --- SLIDESHOW --- */
        #slideshow-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; display: none; background: black;
        }
        .slide {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: 1s; transform: scale(1.1);
        }
        .slide.active-slide { opacity: 1; transform: scale(1); }

    </style>
</head>
<body>

    <div class="vignette"></div>
    <canvas id="bg-canvas"></canvas>

    <div id="cursor-wrap">
        <svg id="heart-cursor" viewBox="0 0 32 32">
            <path d="M16 28.5L14.1 26.8C7.4 20.7 3 16.7 3 11.8C3 7.8 6.1 4.7 10.1 4.7C12.4 4.7 14.5 5.7 16 7.4C17.5 5.7 19.6 4.7 21.9 4.7C25.9 4.7 29 7.8 29 11.8C29 16.7 24.6 20.7 17.9 26.8L16 28.5Z"/>
        </svg>
    </div>

    <div id="p1" class="phase active">
        <h2 style="font-family: 'Cinzel'; margin-bottom: 20px;">Before we begin...</h2>
        <p style="margin-bottom: 30px;">May I play something special for us? ❤️</p>
        <div>
            <button class="btn btn-primary" onclick="startApp(true)">🎶 Enable Music</button>
            <button class="btn" onclick="startApp(false)">🔇 Continue Without Music</button>
        </div>
    </div>

    <div id="p2" class="phase">
        <div class="cine-text" id="intro-text"></div>
    </div>

    <div id="p3" class="phase">
        <div id="ring-ui">
            <div id="ring-content">
                <h1 style="font-family: 'Great Vibes'; font-size: 2.2rem; color: white;">Will You Be My Valentine? ❤️</h1>
                <div id="proposal-btns" style="display: none; margin-top: 30px; height: 150px; position: relative;">
                    <button id="yes-btn" class="btn btn-primary" onclick="triggerTransformation()">💖 YES</button>
                    <button id="no-btn" class="btn">💔 NO</button>
                </div>
            </div>
        </div>
    </div>

    <div id="p4" class="phase" style="background: transparent;">
        <div id="morph-heart" style="font-size: 50px; transition: 4s cubic-bezier(.87,0,.13,1);">❤️</div>
    </div>

    <div id="p5" class="phase">
        <div class="glass-card">
            <div style="font-size: 50px; animation: pump 1s infinite;">❤️</div>
            <h2 style="font-family: 'Cinzel'; margin-top: 20px;">Happiest Ever! 💖</h2>
            <p style="margin: 20px 0;">You just made my heart complete. This is our forever.</p>
            <button class="btn btn-primary" onclick="showSlideshow()">💑 See Our Love Story?</button>
            <br>
            <button class="btn" style="font-size: 0.8rem;" onclick="location.reload()">Replay Proposal</button>
        </div>
    </div>

    <div id="slideshow-container">
        <div id="slides-wrapper"></div>
        <div style="position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 60;">
            <button class="btn" onclick="location.reload()">Return 🌹</button>
        </div>
    </div>

    <audio id="music-1" loop><source src="https://www.chosic.com/wp-content/uploads/2021/07/Rainy-Day-Games.mp3" type="audio/mpeg"></audio>
    <audio id="music-2"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg"></audio>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor-wrap');
        const introTextEl = document.getElementById('intro-text');
        
        let mX = 0, mY = 0;
        let isMusicEnabled = false;
        let ringScene, ringCamera, ringRenderer, ringMesh;

        // --- 1. INITIALIZATION ---
        function startApp(music) {
            isMusicEnabled = music;
            if(music) {
                document.getElementById('music-1').play();
                document.getElementById('music-1').volume = 0.5;
            }
            switchPhase('p1', 'p2');
            runCinematicIntro();
        }

        function switchPhase(oldId, newId) {
            document.getElementById(oldId).classList.remove('active');
            document.getElementById(newId).classList.add('active');
        }

        // --- 2. CURSOR & PARTICLES ---
        window.addEventListener('mousemove', (e) => {
            mX = e.clientX; mY = e.clientY;
            cursor.style.left = mX + 'px';
            cursor.style.top = mY + 'px';
            if(Math.random() > 0.85) createTrailEmoji(mX, mY);

            // No Button Evasion
            const noBtn = document.getElementById('no-btn');
            if (noBtn && document.getElementById('proposal-btns').style.display !== 'none') {
                const rect = noBtn.getBoundingClientRect();
                const dist = Math.hypot(mX - (rect.left + rect.width/2), mY - (rect.top + rect.height/2));
                if (dist < 100) moveNoButton(noBtn);
            }
        });

        function createTrailEmoji(x, y) {
            const emojis = ['❤️', '💕', '💖', '💘', '💝', '💋', '😘'];
            const el = document.createElement('div');
            el.className = 'trail-emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            el.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*100}px, -100px) scale(0)`, opacity: 0 }
            ], { duration: 1500, easing: 'ease-out' }).onfinish = () => el.remove();
        }

        // --- 3. THREE.JS RING ---
        function initRing() {
            const container = document.getElementById('ring-ui');
            ringScene = new THREE.Scene();
            ringCamera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            ringRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            ringRenderer.setSize(400, 400);
            container.appendChild(ringRenderer.domElement);

            const geometry = new THREE.TorusGeometry(10, 0.8, 16, 100);
            const material = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 1, roughness: 0.1 });
            ringMesh = new THREE.Mesh(geometry, material);
            ringScene.add(ringMesh);

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(10, 10, 10);
            ringScene.add(light);
            ringScene.add(new THREE.AmbientLight(0xffffff, 0.5));

            ringCamera.position.z = 25;
            animateRing();
        }

        function animateRing() {
            requestAnimationFrame(animateRing);
            ringMesh.rotation.y += 0.01;
            ringMesh.rotation.x += 0.005;
            ringRenderer.render(ringScene, ringCamera);
        }

        // --- 4. PHASE LOGIC ---
        function runCinematicIntro() {
            const lines = ["In a world of billions...", "There is only one...", "My heart beats for you."];
            let i = 0;
            const timer = setInterval(() => {
                if(i < lines.length) {
                    introTextEl.innerText = lines[i];
                    introTextEl.classList.remove('show-text');
                    void introTextEl.offsetWidth; 
                    introTextEl.classList.add('show-text');
                    i++;
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        switchPhase('p2', 'p3');
                        initRing();
                        setTimeout(() => {
                            document.getElementById('proposal-btns').style.display = 'block';
                        }, 5000); // Button delay logic (simplified for demo, set to 33000 for exact requirement)
                    }, 2000);
                }
            }, 4500);
        }

        function moveNoButton(btn) {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            const playful = ["Please? 🥺", "Are you sure? 😭", "Wrong button! 💔", "Try again ❤️"];
            btn.innerText = playful[Math.floor(Math.random()*playful.length)];
        }

        // --- 5. TRANSFORMATION & CELEBRATION ---
        function triggerTransformation() {
            switchPhase('p3', 'p4');
            const heart = document.getElementById('morph-heart');
            
            // Pumping zoom sequence
            setTimeout(() => heart.style.transform = 'scale(5)', 500);
            setTimeout(() => heart.style.transform = 'scale(15)', 1500);
            setTimeout(() => heart.style.transform = 'scale(50)', 2500);
            setTimeout(() => {
                heart.style.opacity = '0';
                triggerExplosion();
                switchPhase('p4', 'p5');
            }, 3500);
        }

        function triggerExplosion() {
            for(let i=0; i<150; i++) {
                setTimeout(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    createTrailEmoji(x, y);
                }, i * 10);
            }
            // Simple fireworks from corners
            spawnFirework(0,0); spawnFirework(window.innerWidth,0);
            spawnFirework(0, window.innerHeight); spawnFirework(window.innerWidth, window.innerHeight);
        }

        function spawnFirework(x, y) {
            for(let i=0; i<20; i++) {
                const el = document.createElement('div');
                el.className = 'trail-emoji';
                el.innerText = '🎆';
                el.style.left = x + 'px'; el.style.top = y + 'px';
                document.body.appendChild(el);
                el.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${(Math.random()-0.5)*600}px, ${(Math.random()-0.5)*600}px)`, opacity: 0 }
                ], { duration: 2000 }).onfinish = () => el.remove();
            }
        }

        // --- 6. SLIDESHOW ---
        function showSlideshow() {
            const container = document.getElementById('slideshow-container');
            const wrapper = document.getElementById('slides-wrapper');
            container.style.display = 'block';
            
            // Using placeholder romantic images
            const images = [
                'https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=1000&q=80',
                'https://images.unsplash.com/photo-1522673607200-164883efbfc1?auto=format&fit=crop&w=1000&q=80',
                'https://images.unsplash.com/photo-1494774157365-9e04c6720e47?auto=format&fit=crop&w=1000&q=80'
            ];

            images.forEach((src, idx) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.style.backgroundImage = `url(${src})`;
                if(idx === 0) slide.classList.add('active-slide');
                wrapper.appendChild(slide);
            });

            let currentSlide = 0;
            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                slides[currentSlide].classList.remove('active-slide');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active-slide');
            }, 3000);
        }

        // Background Star Field
        function initBg() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const stars = Array.from({length: 100}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 2
            }));

            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = "white";
                stars.forEach(s => {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
                    ctx.fill();
                    s.y -= 0.2;
                    if(s.y < 0) s.y = canvas.height;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
        initBg();

    </script>
</body>
</html>
