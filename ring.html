<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In A World Of Billions...</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Cinzel', serif; }
        #container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .overlay {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; z-index: 10;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            text-align: center;
        }

        /* Prismatic Animated Cursor from previous requirements */
        #cursor {
            position: fixed; width: 25px; height: 25px;
            pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%);
            animation: colorShift 8s linear infinite;
        }

        @keyframes colorShift {
            0% { color: #ff3e6c; } 20% { color: #93C572; }
            40% { color: #ff00ff; } 60% { color: #f33a73; }
            80% { color: #8b5cf6; } 100% { color: #ff3e6c; }
        }
    </style>
</head>
<body>

    <div id="cursor">❤️</div>
    <div class="overlay">
        <h1>In a world of billions...</h1>
    </div>
    <div id="container"></div>

    <script>
        let scene, camera, renderer, ringGroup, stars;

        function init() {
            scene = new THREE.Scene();
            
            // Adjusting Camera to focus on the "Presentation" angle
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.25;
            document.getElementById('container').appendChild(renderer.domElement);

            // 1. GALAXY BACKGROUND
            const starGeo = new THREE.BufferGeometry();
            const starCount = 5000;
            const posArray = new Float32Array(starCount * 3);
            for(let i=0; i < starCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 100;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff, transparent: true, opacity: 0.8 });
            stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // 2. RING GROUP (Centers both band and stone)
            ringGroup = new THREE.Group();
            scene.add(ringGroup);

            // 3. LUXURY GOLD BAND
            const ringGeo = new THREE.TorusGeometry(2, 0.12, 32, 100);
            const ringMat = new THREE.MeshStandardMaterial({
                color: 0xffd700, 
                metalness: 1.0,
                roughness: 0.05,
                emissive: 0x332200,
                emissiveIntensity: 0.2
            });
            const band = new THREE.Mesh(ringGeo, ringMat);
            
            // This rotation makes the ring face the user "showing it to us"
            band.rotation.x = Math.PI / 2; 
            ringGroup.add(band);

            // 4. REALISTIC FACETED DIAMOND
            const diaGeo = new THREE.IcosahedronGeometry(0.5, 0); 
            const diaMat = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                shininess: 150,
                transparent: true,
                opacity: 0.95,
                emissive: 0x444444,
                specular: 0xffffff,
                flatShading: true 
            });
            
            const diamond = new THREE.Mesh(diaGeo, diaMat);
            // Positioned at the top of the ring
            diamond.position.y = 2.1; 
            ringGroup.add(diamond);

            // 5. CINEMATIC LIGHTING
            const sparkleLight = new THREE.PointLight(0xffffff, 2.5, 50);
            sparkleLight.position.set(5, 5, 5);
            scene.add(sparkleLight);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Rotating the entire group so it remains perfectly centered while showing
            ringGroup.rotation.y += 0.01;
            
            // Gentle tilt to make the diamond catch light
            ringGroup.rotation.x = Math.sin(Date.now() * 0.001) * 0.15;

            stars.rotation.y += 0.0003;

            renderer.render(scene, camera);
        }

        // Mouse interaction for cursor
        window.addEventListener('mousemove', (e) => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // Slight parallax based on mouse movement
            ringGroup.position.x = (e.clientX / window.innerWidth - 0.5) * 0.5;
            ringGroup.position.y = -(e.clientY / window.innerHeight - 0.5) * 0.5;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
