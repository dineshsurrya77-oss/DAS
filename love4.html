<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Dharshini | A Cinematic Proposal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap');

        :root {
            --love-pink: #ff4d6d;
            --love-dark: #ff0a54;
            --bg-black: #050102;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            /* Hide real cursor */
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-black);
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* --- CURSOR --- */
        #heart-pointer {
            position: fixed;
            top: 0;
            left: 0;
            width: 30px;
            height: 30px;
            z-index: 999999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 10px rgba(255, 62, 108, 0.5));
            animation: heartBeat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes heartBeat {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            15% {
                transform: translate(-50%, -50%) scale(1.25);
            }

            30% {
                transform: translate(-50%, -50%) scale(1);
            }

            45% {
                transform: translate(-50%, -50%) scale(1.15);
            }

            60% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .heart-emoji {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999999;
            font-size: 20px;
            user-select: none;
        }

        @keyframes floatUpFade {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(20px, -100px) scale(0.5);
            }
        }

        /* --- SCENES --- */
        .scene {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 2s ease;
        }

        #intro-scene {
            position: fixed;
            background: var(--bg-black);
            z-index: 50;
        }

        .intro-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            position: absolute;
            opacity: 0;
            transition: opacity 1.5s ease;
            width: 90%;
        }

        #main-scene {
            background: radial-gradient(circle at center, #2b030a 0%, #050102 100%);
            opacity: 0;
            display: none;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 8vw, 5rem);
            margin-bottom: 2rem;
            text-shadow: 0 0 30px rgba(255, 77, 109, 0.6);
        }

        /* --- BUTTONS --- */
        .button-box {
            position: relative;
            display: flex;
            gap: 3rem;
            height: 100px;
            align-items: center;
        }

        .btn {
            padding: 1.2rem 3.5rem;
            font-size: 1.6rem;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            transition: transform 0.2s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #yes-btn {
            background: linear-gradient(45deg, var(--love-pink), var(--love-dark));
            color: white;
            z-index: 10;
        }

        #no-btn {
            background: white;
            color: var(--bg-black);
            position: absolute;
            left: 200px;
            /* Initial offset */
        }

        /* --- CONGRATULATIONS DIALOG --- */
        #congrats-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            backdrop-filter: blur(15px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4rem;
            border-radius: 40px;
            max-width: 600px;
            width: 90%;
            animation: modalPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* --- MUSIC TOGGLE --- */
        #music-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 50%;
            z-index: 30000;
        }
    </style>
</head>

<body>

    <div id="heart-pointer">
        <svg viewBox="0 0 32 32" fill="var(--love-pink)">
            <path
                d="M16 28.5L14.1 26.8C7.4 20.7 3 16.7 3 11.8C3 7.8 6.1 4.7 10.1 4.7C12.4 4.7 14.5 5.7 16 7.4C17.5 5.7 19.6 4.7 21.9 4.7C25.9 4.7 29 7.8 29 11.8C29 16.7 24.6 20.7 17.9 26.8L16 28.5Z" />
        </svg>
    </div>

    <audio id="intro-music">
        <source src="https://github.com/DINESHSURRYA/junior/raw/main/Enna%20Solla%20Pogirai%20Bgm.mp3"
            type="audio/mpeg">
    </audio>
    <audio id="celebration-music" loop>
        <source
            src="https://github.com/DINESHSURRYA/junior/raw/main/Yen%20Moochavan%20Pechavan%20-%20Oorum%20Blood%20_%20Dude%20_%20Tamil.mp3"
            type="audio/mpeg">
    </audio>

    <div id="music-gateway"
        style="position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: sans-serif;">
        <h1 style="margin-bottom: 20px;">Start Cinematic Proposal? ❤️</h1>
        <div style="display: flex; gap: 20px;">
            <button onclick="startExperience(true)"
                style="padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #ff3e6c; color: white; border: none; border-radius: 50px;">Play
                with Music 🎵</button>

        </div>
    </div>

    <div id="intro-scene" class="scene">
        <div class="intro-text" id="t1">In a world full of noise...</div>
        <div class="intro-text" id="t2">I found a rhythm in you, <b>Dharshini</b>.</div>
        <div class="intro-text" id="t3">My Heart chose you. ❤️</div>
    </div>

    <div id="main-scene" class="scene">
        <h1>Will You Be My Valentine, <br>Dharshini?</h1>
        <div class="button-box">
            <button class="btn" id="yes-btn" onclick="showCongratulations()">YES</button>
            <button class="btn" id="no-btn">No</button>
        </div>
    </div>

    <div id="congrats-modal">
        <div class="glass-card">
            <div style="font-size: 5rem; margin-bottom: 1rem;">💖</div>
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">Congratulations, Dharshini!</h1>
            <p style="font-size: 1.4rem; line-height: 1.8; font-weight: 300;">
                You've made my world infinitely more beautiful. <br>
                This is the start of our cinematic forever. ✨
            </p>
            <button class="btn" style="margin-top: 2rem; font-size: 1.2rem;" onclick="location.reload()">Love You
                Always</button>
        </div>
    </div>

    <script>
        const heartPointer = document.getElementById('heart-pointer');
        let song = document.getElementById('intro-music');
        const noBtn = document.getElementById('no-btn');
        let musicAllowed = false;
        const emojis = ['❤️', '💖', '💝', '💗', '💓', '✨'];

        // 1. Pumping Heart Cursor + Continuous Trailing
        document.addEventListener('mousemove', (e) => {
            heartPointer.style.left = e.clientX + 'px';
            heartPointer.style.top = e.clientY + 'px';

            if (Math.random() > 0.8) {
                createHeartTrail(e.clientX, e.clientY);
            }
        });

        function createHeartTrail(x, y) {
            const el = document.createElement('div');
            el.className = 'heart-emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            const angle = Math.random() * Math.PI * 2;
            const destX = x + Math.cos(angle) * 50;
            const destY = y + Math.sin(angle) * 50 - 50;
            el.animate([
                { transform: `translate(0,0) scale(0)`, opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(1.5)`, opacity: 0 }
            ], { duration: 1000, fill: 'forwards' }).onfinish = () => el.remove();
        }

        // 2. Cinematic Intro Sequence
        function startExperience(allow) {
            document.getElementById('music-gateway').style.display = 'none';
            musicAllowed = allow;
            if (allow) {
                song.play().catch(e => console.log(e));
                song.volume = 0.5;
            }

            setTimeout(() => fadeText('t1', 2000), 1000);
            setTimeout(() => fadeText('t2', 2000), 4000);
            setTimeout(() => fadeText('t3', 2500), 7000);
            setTimeout(revealMainProposal, 10500);
        }

        function fadeText(id, duration) {
            const el = document.getElementById(id);
            el.style.opacity = '1';
            setTimeout(() => { el.style.opacity = '0'; }, duration);
        }

        function revealMainProposal() {
            document.getElementById('intro-scene').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-scene').style.display = 'none';
                const main = document.getElementById('main-scene');
                main.style.display = 'flex';
                setTimeout(() => main.style.opacity = '1', 50);
            }, 1500);
        }

        // 3. No Button Escape (Cinematic Motion)
        noBtn.addEventListener('mouseover', () => {
            const safePadding = 100;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - safePadding);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - safePadding);

            noBtn.style.transition = "all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            const cheekyTexts = ["Wait! 😳", "Try again 🥺", "Wrong choice! 💔", "Missed me! 😈"];
            noBtn.innerText = cheekyTexts[Math.floor(Math.random() * cheekyTexts.length)];
        });

        // 4. Congratulations Scene
        function showCongratulations() {
            if (musicAllowed) {
                song.pause();
                song = document.getElementById('celebration-music');
                song.volume = 0.5;
                song.play();
            }

            document.getElementById('congrats-modal').style.display = 'flex';
            startConfetti();
        }

        function startConfetti() {
            setInterval(() => {
                const particle = document.createElement('div');
                particle.innerHTML = '❤️';
                particle.style.position = 'fixed';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = '-50px';
                particle.style.zIndex = '30000';
                particle.style.fontSize = Math.random() * 20 + 20 + 'px';
                particle.style.transition = `transform ${Math.random() * 2 + 3}s linear`;
                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.style.transform = `translateY(110vh) rotate(${Math.random() * 360}deg)`;
                }, 100);
                setTimeout(() => particle.remove(), 5000);
            }, 150);
        }

        function toggleMusic() {
            if (song.paused) {
                song.play();
                document.getElementById('music-btn').innerText = '⏸️';
            } else {
                song.pause();
                document.getElementById('music-btn').innerText = '🎵';
            }
        }
    </script>
</body>

</html>
