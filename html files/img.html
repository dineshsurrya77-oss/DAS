<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Brightness Adjuster</title>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        /* Editor Section */
        .editor-box {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-top: 20px;
        }

        .image-preview {
            width: 100%;
            max-height: 500px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            border: 2px dashed rgba(255,255,255,0.2);
        }

        #outputImage {
            max-width: 100%;
            height: auto;
            transition: filter 0.1s ease-out;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Image Brightener</h1>
        <p>Upload an image and adjust the slider to enhance brightness.</p>

        <div class="editor-box">
            <div class="image-preview" id="dropZone">
                <img id="outputImage" src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80" alt="Preview">
            </div>

            <div class="controls">
                <div class="slider-group">
                    <label>Brightness: <span id="val">100</span>%</label>
                    <input type="range" id="brightness" min="0" max="300" value="100">
                </div>

                <div class="btn-row">
                    <button class="btn" onclick="document.getElementById('fileInput').click()">Upload Image</button>
                    <input type="file" id="fileInput" accept="image/*">
                    <button class="btn btn-secondary" onclick="reset()">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const image = document.getElementById('outputImage');
        const slider = document.getElementById('brightness');
        const valText = document.getElementById('val');
        const fileInput = document.getElementById('fileInput');

        // Handle Slider
        slider.addEventListener('input', () => {
            const val = slider.value;
            valText.innerText = val;
            image.style.filter = `brightness(${val}%)`;
        });

        // Handle File Upload
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    image.src = e.target.result;
                    reset(); // Reset brightness for new image
                }
                reader.readAsDataURL(file);
            }
        });

        function reset() {
            slider.value = 100;
            valText.innerText = 100;
            image.style.filter = 'brightness(100%)';
        }
    </script>
</body>
</html>
