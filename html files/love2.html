<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Cinematic Proposal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap');

        :root {
            --primary-love: #ff4d6d;
            --secondary-love: #c9184a;
            --bg-dark: #0a0103;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            /* Custom cursor will be added via JS */
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* --- CINEMATIC INTRO --- */
        #intro-sequence {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            text-align: center;
        }

        .intro-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            opacity: 0;
            position: absolute;
            transition: opacity 1.5s ease;
        }

        /* --- BACKGROUND SCENE --- */
        #main-scene {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0105 0%, #4a0e1c 50%, #1a0105 100%);
            opacity: 0;
            transition: opacity 3s ease;
        }

        .stars-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* --- PROPOSAL UI --- */
        .proposal-container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.5);
            animation: breathing 3s infinite ease-in-out;
        }

        @keyframes breathing {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.9;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        .button-group {
            display: flex;
            gap: 2rem;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
        }

        .btn {
            padding: 1.2rem 3rem;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        #yes-btn {
            background: var(--primary-love);
            color: white;
            box-shadow: 0 0 20px var(--primary-love);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(255, 77, 109, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 77, 109, 0);
            }
        }

        #no-btn {
            background: white;
            color: var(--bg-dark);
            position: relative;
            /* Start relative */
        }

        /* --- SUCCESS DIALOG --- */
        #success-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            z-index: 2000;
            display: none;
            opacity: 0;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .heart-icon {
            font-size: 4rem;
            color: var(--primary-love);
            animation: heartbeat 1.2s infinite;
            margin-bottom: 1rem;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.3);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.15);
            }
        }

        /* --- CURSOR --- */
        #heart-pointer {
            position: fixed;
            top: 0;
            left: 0;
            width: 30px;
            height: 30px;
            z-index: 999999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 10px rgba(255, 62, 108, 0.5));
            animation: heartBeat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes heartBeat {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            15% {
                transform: translate(-50%, -50%) scale(1.25);
            }

            30% {
                transform: translate(-50%, -50%) scale(1);
            }

            45% {
                transform: translate(-50%, -50%) scale(1.15);
            }

            60% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .heart-emoji {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999999;
            font-size: 20px;
            user-select: none;
        }

        /* --- CONTROLS --- */
        .audio-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
            background: var(--glass);
            border: none;
            padding: 10px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <audio id="intro-music">
        <source src="https://github.com/DINESHSURRYA/junior/raw/main/Enna%20Solla%20Pogirai%20Bgm.mp3"
            type="audio/mpeg">
    </audio>
    <audio id="celebration-music" loop>
        <source
            src="https://github.com/DINESHSURRYA/junior/raw/main/Yen%20Moochavan%20Pechavan%20-%20Oorum%20Blood%20_%20Dude%20_%20Tamil.mp3"
            type="audio/mpeg">
    </audio>

    <div id="heart-pointer">
        <svg viewBox="0 0 32 32" fill="var(--primary-love)">
            <path
                d="M16 28.5L14.1 26.8C7.4 20.7 3 16.7 3 11.8C3 7.8 6.1 4.7 10.1 4.7C12.4 4.7 14.5 5.7 16 7.4C17.5 5.7 19.6 4.7 21.9 4.7C25.9 4.7 29 7.8 29 11.8C29 16.7 24.6 20.7 17.9 26.8L16 28.5Z" />
        </svg>
    </div>

    <button class="audio-toggle" onclick="toggleAudio()">🎵</button>

    <div id="music-gateway"
        style="position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: sans-serif;">
        <h1 style="margin-bottom: 20px;">Start Cinematic Proposal? ❤️</h1>
        <div style="display: flex; gap: 20px;">
            <button onclick="startExperience(true)"
                style="padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #ff3e6c; color: white; border: none; border-radius: 50px;">Play
                with Music 🎵</button>

        </div>
    </div>

    <div id="intro-sequence">
        <div class="intro-text" id="t1">In a world full of millions...</div>
        <div class="intro-text" id="t2">My heart chose only one...</div>
        <div class="intro-text" id="t3">You ❤️</div>
    </div>

    <div id="main-scene">
        <div class="stars-container" id="stars"></div>

        <div class="proposal-container">
            <h1>Will You Be My Valentine?</h1>
            <div class="button-group">
                <button class="btn" id="yes-btn" onclick="celebrate()">YES</button>
                <button class="btn" id="no-btn">No</button>
            </div>
        </div>
    </div>

    <div id="success-dialog">
        <div class="heart-icon">❤️</div>
        <h2 style="font-family: 'Dancing Script'; font-size: 2.5rem; margin-bottom: 1rem;">Yay! Forever it is!</h2>
        <p style="line-height: 1.6; font-weight: 300;">You just made my world brighter 💖✨<br>This is the beginning of
            our forever...</p>
        <button class="btn" style="margin-top: 2rem; font-size: 1rem; padding: 0.8rem 2rem;"
            onclick="location.reload()">Love You!</button>
    </div>

    <script>
        const heartPointer = document.getElementById('heart-pointer');
        const intro = document.getElementById('intro-sequence');
        const main = document.getElementById('main-scene');
        const noBtn = document.getElementById('no-btn');
        let bgMusic = document.getElementById('intro-music');
        let audioStarted = false;
        let musicAllowed = false;

        function startExperience(allow) {
            document.getElementById('music-gateway').style.display = 'none';
            musicAllowed = allow;
            if (allow) {
                bgMusic.play().catch(e => console.log(e));
                bgMusic.volume = 0.5;
                audioStarted = true;
            }
            // Start Intro Sequence after choice
            setTimeout(() => showText('t1', 2000), 1000);
            setTimeout(() => showText('t2', 2000), 4000);
            setTimeout(() => showText('t3', 2500), 7000);
            setTimeout(transitionToMain, 10500);
            createStars();
        }

        // Custom Cursor Logic
        const emojis = ['❤️', '💖', '💝', '💗', '💓', '✨'];

        document.addEventListener('mousemove', (e) => {
            heartPointer.style.left = e.clientX + 'px';
            heartPointer.style.top = e.clientY + 'px';

            if (Math.random() > 0.8) {
                createHeartTrail(e.clientX, e.clientY);
            }
        });

        function createHeartTrail(x, y) {
            const el = document.createElement('div');
            el.className = 'heart-emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            const angle = Math.random() * Math.PI * 2;
            const destX = x + Math.cos(angle) * 50;
            const destY = y + Math.sin(angle) * 50 - 50;
            el.animate([
                { transform: `translate(0,0) scale(0)`, opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(1.5)`, opacity: 0 }
            ], { duration: 1000, fill: 'forwards' }).onfinish = () => el.remove();
        }

        // Intro Sequence
        // window.addEventListener('load', () => { ... }); REMOVED, now triggered by startExperience

        function showText(id, delay) {
            const el = document.getElementById(id);
            el.style.opacity = '1';
            setTimeout(() => { el.style.opacity = '0'; }, delay);
        }

        function transitionToMain() {
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                main.style.opacity = '1';
                // if (!audioStarted) toggleAudio(); // Removed auto-toggle logic
            }, 1500);
        }

        // No Button Escape Logic
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

            noBtn.style.position = 'absolute'; // Switch to absolute
            noBtn.style.transition = "all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            const texts = ["Wait 😳", "Please no 😭", "Try again 🥺", "Wrong button! 💔"];
            noBtn.innerText = texts[Math.floor(Math.random() * texts.length)];
        });

        // Celebration
        function celebrate() {
            if (musicAllowed) {
                document.getElementById('intro-music').pause();
                const celebMusic = document.getElementById('celebration-music');
                celebMusic.volume = 0.5;
                celebMusic.play();
                bgMusic = celebMusic; // Update reference for toggle button
            }

            const dialog = document.getElementById('success-dialog');
            dialog.style.display = 'block';
            setTimeout(() => {
                dialog.style.opacity = '1';
                dialog.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 100);

            // Trigger Confetti
            for (let i = 0; i < 100; i++) {
                setTimeout(createConfetti, i * 20);
            }
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.fontSize = (Math.random() * 20 + 10) + 'px';
            confetti.innerHTML = ['❤️', '💖', '✨', '🌸'][Math.floor(Math.random() * 4)];
            confetti.style.zIndex = '1500';
            confetti.style.transition = `transform ${Math.random() * 3 + 2}s linear, opacity 2s`;

            document.body.appendChild(confetti);

            setTimeout(() => {
                confetti.style.transform = `translateY(105vh) rotate(${Math.random() * 360}deg)`;
            }, 10);

            setTimeout(() => confetti.remove(), 5000);
        }

        // Background Stars
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }

        function toggleAudio() {
            if (bgMusic.paused) {
                bgMusic.play();
                audioStarted = true;
            } else {
                bgMusic.pause();
            }
        }
    </script>
</body>

</html>
