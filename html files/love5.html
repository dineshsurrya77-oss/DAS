<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cinematic Proposal | Three.js Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --pink: #ff3e6c;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #020205;
            font-family: 'Cinzel', serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- CINEMATIC UI --- */
        .overlay-ui {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            color: white;
        }

        .intro-text {
            font-size: 2rem;
            letter-spacing: 5px;
            opacity: 0;
            transition: opacity 2s ease;
            margin: 10px;
        }

        .proposal-group {
            display: none;
            pointer-events: auto;
            flex-direction: column;
            align-items: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            margin: 20px;
            text-transform: uppercase;
        }

        #yes-btn {
            background: linear-gradient(45deg, var(--gold), #f9e29d);
            color: #4a3500;
            box-shadow: 0 0 30px var(--gold);
            animation: pulse 2s infinite;
        }

        #no-btn {
            background: white;
            color: #333;
            position: absolute;
        }

        /* --- GLASS CELEBRATION --- */
        #final-card {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 50px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
            text-align: center;
            color: white;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        /* --- CURSOR --- */
        #heart-pointer {
            position: fixed;
            top: 0;
            left: 0;
            width: 30px;
            height: 30px;
            z-index: 999999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 10px rgba(255, 62, 108, 0.5));
            animation: heartBeat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes heartBeat {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            15% {
                transform: translate(-50%, -50%) scale(1.25);
            }

            30% {
                transform: translate(-50%, -50%) scale(1);
            }

            45% {
                transform: translate(-50%, -50%) scale(1.15);
            }

            60% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .heart-emoji {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999999;
            font-size: 20px;
            user-select: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <div id="music-gateway"
        style="position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: sans-serif;">
        <h1 style="margin-bottom: 20px;">Start 3D Experience? ❤️</h1>
        <div style="display: flex; gap: 20px;">
            <button onclick="startExperience(true)"
                style="padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #ff3e6c; color: white; border: none; border-radius: 50px;">Play
                with Music 🎵</button>

        </div>
    </div>
    <div id="heart-pointer">
        <svg viewBox="0 0 32 32" fill="var(--pink)">
            <path
                d="M16 28.5L14.1 26.8C7.4 20.7 3 16.7 3 11.8C3 7.8 6.1 4.7 10.1 4.7C12.4 4.7 14.5 5.7 16 7.4C17.5 5.7 19.6 4.7 21.9 4.7C25.9 4.7 29 7.8 29 11.8C29 16.7 24.6 20.7 17.9 26.8L16 28.5Z" />
        </svg>
    </div>
    <div id="canvas-container"></div>

    <div class="overlay-ui">
        <div id="intro-sequence">
            <p class="intro-text" id="t1">Across galaxies...</p>
            <p class="intro-text" id="t2">Beyond time...</p>
            <p class="intro-text" id="t3">There is only one heart I choose.</p>
        </div>

        <div class="proposal-group" id="proposal">
            <h1 style="font-size: 3rem; margin-bottom: 40px;">Will You Be My Valentine? ❤️</h1>
            <div style="position: relative; width: 100%; height: 200px; display: flex; justify-content: center;">
                <button id="yes-btn" class="btn" onclick="celebrate()">YES</button>
                <button id="no-btn" class="btn">NO</button>
            </div>
        </div>
    </div>

    <div id="final-card">
        <h1 style="color: var(--gold);">Universe Complete 💍</h1>
        <p>Forever starts now.</p>
        <button class="btn" style="margin-top: 20px; font-size: 1rem;" onclick="location.reload()">Replay</button>
    </div>

    <audio id="intro-music">
        <source src="https://github.com/DINESHSURRYA/junior/raw/main/Enna%20Solla%20Pogirai%20Bgm.mp3"
            type="audio/mpeg">
    </audio>
    <audio id="celebration-music" loop>
        <source
            src="https://github.com/DINESHSURRYA/junior/raw/main/Yen%20Moochavan%20Pechavan%20-%20Oorum%20Blood%20_%20Dude%20_%20Tamil.mp3"
            type="audio/mpeg">
    </audio>

    <script>
        let scene, camera, renderer, ring, diamond, stars;
        let isCelebrating = false;
        let musicAllowed = false;
        const introMusic = document.getElementById('intro-music');
        const celebMusic = document.getElementById('celebration-music');

        function startExperience(allow) {
            document.getElementById('music-gateway').style.display = 'none';
            musicAllowed = allow;
            if (allow) {
                introMusic.play().catch(err => console.log('Autoplay blocked', err));
                introMusic.volume = 0.5;
            }
            init3D();
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 🌟 Cinematic Starfield
            const starGeo = new THREE.BufferGeometry();
            const starCount = 5000;
            const posArray = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount * 3; i++) posArray[i] = (Math.random() - 0.5) * 100;
            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff });
            stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // 💍 3D Ring Procedural
            const ringGeo = new THREE.TorusGeometry(1, 0.1, 16, 100);
            const ringMat = new THREE.MeshStandardMaterial({
                color: 0xd4af37, metalness: 1, roughness: 0.1, emissive: 0x221100
            });
            ring = new THREE.Mesh(ringGeo, ringMat);
            scene.add(ring);

            // 💎 Diamond Procedural
            const diaGeo = new THREE.OctahedronGeometry(0.3, 0);
            const diaMat = new THREE.MeshPhongMaterial({
                color: 0xffffff, shininess: 100, transparent: true, opacity: 0.9,
                emissive: 0x222222
            });
            diamond = new THREE.Mesh(diaGeo, diaMat);
            diamond.position.y = 1.05;
            ring.add(diamond);

            // Lighting
            const light = new THREE.PointLight(0xffffff, 2, 100);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 2));

            animate();
            runIntro();
        }

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.001;

            if (!isCelebrating) {
                ring.rotation.y += 0.01;
                ring.rotation.z = Math.sin(Date.now() * 0.001) * 0.1;
            } else {
                ring.rotation.y += 0.05;
                camera.position.z -= (camera.position.z - 2.5) * 0.05;
            }

            renderer.render(scene, camera);
        }

        // 🎬 Cinematic Logic
        function runIntro() {
            const delay = 2500;
            setTimeout(() => document.getElementById('t1').style.opacity = 1, 500);
            setTimeout(() => document.getElementById('t2').style.opacity = 1, 500 + delay);
            setTimeout(() => document.getElementById('t3').style.opacity = 1, 500 + delay * 2);
            setTimeout(() => {
                document.getElementById('intro-sequence').style.display = 'none';
                document.getElementById('proposal').style.display = 'flex';
            }, 500 + delay * 3.5);
        }

        // 🎮 Button Logic
        const noBtn = document.getElementById('no-btn');
        const heartPointer = document.getElementById('heart-pointer');
        const emojis = ['❤️', '💖', '💝', '💗', '💓', '✨'];

        document.addEventListener('mousemove', (e) => {
            heartPointer.style.left = e.clientX + 'px';
            heartPointer.style.top = e.clientY + 'px';

            if (Math.random() > 0.8) createHeartTrail(e.clientX, e.clientY);

            const rect = noBtn.getBoundingClientRect();
            const dist = Math.hypot(e.clientX - (rect.left + rect.width / 2), e.clientY - (rect.top + rect.height / 2));
            if (dist < 100) {
                noBtn.style.left = Math.random() * 80 + '%';
                noBtn.style.top = Math.random() * 80 + '%';
                noBtn.innerText = "Please? 🥺";
            }
        });

        function createHeartTrail(x, y) {
            const el = document.createElement('div');
            el.className = 'heart-emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            const angle = Math.random() * Math.PI * 2;
            const destX = x + Math.cos(angle) * 50;
            const destY = y + Math.sin(angle) * 50 - 50;
            el.animate([
                { transform: `translate(0,0) scale(0)`, opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(1.5)`, opacity: 0 }
            ], { duration: 1000, fill: 'forwards' }).onfinish = () => el.remove();
        }

        function celebrate() {
            isCelebrating = true;
            document.getElementById('proposal').style.display = 'none';
            document.getElementById('final-card').style.display = 'block';

            if (musicAllowed) {
                introMusic.pause();
                celebMusic.volume = 0.5;
                celebMusic.play();
            }

            // Explosion logic
            diamond.material.emissive.setHex(0xffffff);
            const flash = new THREE.PointLight(0xff007f, 10, 100);
            scene.add(flash);
        }

        // window.onload = init3D; // Handled by startExperience
    </script>
</body>

</html>
