<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Will You Be Mine? 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Dancing Script', cursive;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            color: pink;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(1); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .glow {
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
        }
    </style>
</head>
<body class="bg-gradient-to-r from-pink-200 via-rose-300 to-red-300 flex items-center justify-center h-screen relative">

    <!-- Floating Hearts -->
    <script>
        for (let i = 0; i < 20; i++) {
            let heart = document.createElement("div");
            heart.innerHTML = "💖";
            heart.classList.add("heart");
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 30 + 20 + "px";
            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.body.appendChild(heart);
        }
    </script>

    <div class="text-center bg-white/30 backdrop-blur-lg p-12 rounded-3xl shadow-2xl">
        <h1 class="text-5xl md:text-6xl text-red-600 mb-8 animate-pulse">
            Will You Be My Valentine? 💕
        </h1>

        <button onclick="celebrate()" 
            class="px-10 py-4 bg-red-500 text-white text-3xl rounded-full 
                   hover:bg-red-600 transform hover:scale-110 
                   transition duration-300 glow">
            YES 💖
        </button>

        <h2 id="message" class="text-4xl text-pink-700 mt-8 hidden">
            Yaaay! You Made My Heart So Happy! 💘✨
        </h2>
    </div>

    <script>
        function celebrate() {

            // Show message
            document.getElementById("message").classList.remove("hidden");

            // Confetti burst
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 }
            });

            // Extra heart burst
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { x: Math.random(), y: Math.random() * 0.5 }
                    });
                }, i * 400);
            }
        }
    </script>

</body>
</html>
