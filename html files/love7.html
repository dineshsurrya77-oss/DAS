<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --pink: #ff3e6c;
            --deep-red: #c9184a;
            --glass: rgba(255, 255, 255, 0.1);
            --dark-bg: #050505;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--dark-bg);
            font-family: 'Montserrat', sans-serif;
            color: white;
            cursor: none;
            /* Custom cursor only */
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* --- PHASE 1: MUSIC APPROVAL --- */
        #music-gateway {
            position: fixed;
            inset: 0;
            z-index: 50000;
            background: radial-gradient(circle at center, #2a0a10 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .gateway-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .gateway-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: var(--pink);
            margin-bottom: 10px;
        }

        .gateway-subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }

        .btn-primary {
            background: var(--pink);
            color: white;
            box-shadow: 0 0 20px rgba(255, 62, 108, 0.5);
        }

        .btn-primary:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 62, 108, 0.8);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* --- PHASE 2: PROPOSAL UI --- */
        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            /* Let clicks pass to 3D if needed, but buttons need pointer-events: auto */
        }

        #proposal-box {
            text-align: center;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            color: white;
            text-shadow: 0 0 30px rgba(255, 62, 108, 0.8);
            margin-bottom: 40px;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                letter-spacing: 5px;
                opacity: 0.9;
            }

            50% {
                letter-spacing: 8px;
                opacity: 1;
            }
        }

        /* --- BUTTONS --- */
        #yes-btn {
            background: linear-gradient(45deg, #ff3e6c, #ff9a9e);
            color: white;
            font-size: 1.5rem;
            padding: 20px 60px;
            box-shadow: 0 0 50px rgba(255, 62, 108, 0.6);
            animation: pulse-heart 1.5s infinite;
        }

        @keyframes pulse-heart {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 62, 108, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 30px rgba(255, 62, 108, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 62, 108, 0);
            }
        }

        #no-btn {
            background: white;
            color: #333;
            font-size: 1.2rem;
            padding: 15px 40px;
            position: relative;
            /* Fixed init position */
        }

        /* --- PHASE 5: CONGRATS CARD --- */
        #final-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            z-index: 20000;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 0 100px rgba(255, 62, 108, 0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .congrats-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        /* --- CURSOR --- */
        #heart-pointer {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            z-index: 999999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 15px rgba(255, 62, 108, 0.8));
            animation: cursorBeat 1s infinite;
        }

        @keyframes cursorBeat {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        .heart-emoji {
            position: fixed;
            pointer-events: none;
            z-index: 999998;
            font-size: 24px;
        }

        /* --- UTILS --- */
        .hidden {
            display: none !important;
        }

        .fade-in {
            opacity: 1 !important;
            pointer-events: auto !important;
        }
    </style>
</head>

<body>

    <!-- PHASE 1: MUSIC APPROVAL -->
    <div id="music-gateway">
        <div class="gateway-card">
            <div class="gateway-title">Before we begin...</div>
            <div class="gateway-subtitle">May I play something special for us? ❤️</div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="startExperience(true)">Yes, Play Music 🎵</button>

            </div>
        </div>
    </div>

    <!-- PHASE 2: 3D SCENE + UI -->
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="intro-texts" style="height: 200px; display: flex; flex-direction: column; justify-content: center;">
            <h1 id="t1" style="font-size: 2.5rem; opacity: 0; transition: 2s;">Across the universe...</h1>
            <h1 id="t2" style="font-size: 2.5rem; opacity: 0; transition: 2s; margin-top: 20px;">I found you.</h1>
        </div>

        <div id="proposal-box">
            <h1 class="main-title">Will You Be My Valentine?</h1>
            <div class="btn-group" style="position: relative; min-height: 100px; width: 400px; margin: 0 auto;">
                <button id="yes-btn" class="btn" onclick="celebrate()">YES! 💖</button>
                <button id="no-btn" class="btn">No</button>
            </div>
        </div>
    </div>

    <!-- PHASE 5: CONGRATS -->
    <div id="final-dialog">
        <div style="font-size: 5rem; margin-bottom: 20px; animation: cursorBeat 1s infinite;">💖</div>
        <div class="congrats-title">It's Forever!</div>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">You just made me the happiest person alive.</p>
        <button class="btn btn-secondary" onclick="location.reload()">Replay Moment ↺</button>
    </div>

    <!-- AUDIO SYSTEM -->
    <audio id="intro-music" preload="auto">
        <source src="https://github.com/DINESHSURRYA/junior/raw/main/Enna%20Solla%20Pogirai%20Bgm.mp3"
            type="audio/mpeg">
    </audio>
    <audio id="celebration-music" loop preload="auto">
        <source
            src="https://github.com/DINESHSURRYA/junior/raw/main/Yen%20Moochavan%20Pechavan%20-%20Oorum%20Blood%20_%20Dude%20_%20Tamil.mp3"
            type="audio/mpeg">
    </audio>

    <!-- CURSOR -->
    <div id="heart-pointer">
        <svg viewBox="0 0 32 32" fill="#ff3e6c">
            <path
                d="M16 28.5L14.1 26.8C7.4 20.7 3 16.7 3 11.8C3 7.8 6.1 4.7 10.1 4.7C12.4 4.7 14.5 5.7 16 7.4C17.5 5.7 19.6 4.7 21.9 4.7C25.9 4.7 29 7.8 29 11.8C29 16.7 24.6 20.7 17.9 26.8L16 28.5Z" />
        </svg>
    </div>

    <script>
        // --- CONFIG ---
        let musicAllowed = false;
        let scene, camera, renderer, composer;
        let ring, diamond, stars;
        let isCelebrating = false;

        const introMusic = document.getElementById('intro-music');
        const celebMusic = document.getElementById('celebration-music');
        const heartPointer = document.getElementById('heart-pointer');
        const emojis = ['❤️', '💖', '💝', '💗', '💓', '✨'];

        // --- PHASE 1: START ---
        function startExperience(allow) {
            musicAllowed = allow;
            const gateway = document.getElementById('music-gateway');
            gateway.style.opacity = '0';
            setTimeout(() => gateway.style.display = 'none', 1000);

            if (allow) {
                introMusic.volume = 0;
                introMusic.play().then(() => fadeInAudio(introMusic, 0.5));
            }

            init3D();
            runCinematicIntro();
        }

        function fadeInAudio(audio, targetVol) {
            let vol = 0;
            const interval = setInterval(() => {
                vol += 0.05;
                if (vol >= targetVol) {
                    vol = targetVol;
                    clearInterval(interval);
                }
                audio.volume = vol;
            }, 200);
        }

        // --- PHASE 2: 3D WORLD ---
        function init3D() {
            scene = new THREE.Scene();
            // Fog for depth
            scene.fog = new THREE.FogExp2(0x050505, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Post Processing (Bloom)
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0;
            bloomPass.strength = 1.5;
            bloomPass.radius = 0;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Objects
            createRing();
            createStars();

            // Lights
            const ambient = new THREE.AmbientLight(0x404040);
            scene.add(ambient);
            const pointLight = new THREE.PointLight(0xffffff, 2, 100);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            animate();
        }

        function createRing() {
            const geometry = new THREE.TorusGeometry(1, 0.15, 30, 200);
            const material = new THREE.MeshStandardMaterial({
                color: 0xd4af37,
                metalness: 0.9,
                roughness: 0.1,
                emissive: 0x442200,
                emissiveIntensity: 0.2
            });
            ring = new THREE.Mesh(geometry, material);
            scene.add(ring);

            // Diamond on top
            const diaGeo = new THREE.OctahedronGeometry(0.35, 0);
            const diaMat = new THREE.MeshPhysicalMaterial({
                color: 0xffffff, transmission: 0.9, opacity: 1, metalness: 0, roughness: 0, ior: 2.4, thickness: 5
            });
            diamond = new THREE.Mesh(diaGeo, diaMat);
            diamond.position.y = 1.1;
            ring.add(diamond);
        }

        function createStars() {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 3000; i++) {
                pos.push((Math.random() - 0.5) * 50, (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 50);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.8 });
            stars = new THREE.Points(geo, mat);
            scene.add(stars);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Slow rotation default
            if (!isCelebrating) {
                ring.rotation.y += 0.005;
                ring.rotation.x = Math.sin(Date.now() * 0.001) * 0.2;
                stars.rotation.y += 0.0005;
            } else {
                // Fast celebration spin
                ring.rotation.y += 0.1;
                ring.scale.addScalar(0.01); // Expand ring
                camera.position.z -= 0.02; // Zoom in
            }

            composer.render();
        }

        // --- CINEMATIC INTRO SEQUENCE ---
        function runCinematicIntro() {
            const ui = document.getElementById('ui-layer');
            ui.style.display = 'flex';

            setTimeout(() => document.getElementById('t1').style.opacity = 1, 1000);
            setTimeout(() => document.getElementById('t2').style.opacity = 1, 3500);

            setTimeout(() => {
                document.getElementById('intro-texts').style.display = 'none';
                const pBox = document.getElementById('proposal-box');
                pBox.style.opacity = 1;
                // Ensure button alignment logic is ready
            }, 7000);
        }

        // --- CURSOR LOGIC ---
        window.addEventListener('mousemove', (e) => {
            heartPointer.style.left = e.clientX + 'px';
            heartPointer.style.top = e.clientY + 'px';

            if (Math.random() > 0.85) createSparkle(e.clientX, e.clientY);

            // NO BUTTON EVASION - Starts strictly aligned
            handleNoButton(e.clientX, e.clientY);
        });

        const noBtn = document.getElementById('no-btn');
        function handleNoButton(mx, my) {
            const rect = noBtn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dist = Math.hypot(mx - centerX, my - centerY);

            if (dist < 120) {
                // Switch to absolute on first evasion to break alignment
                if (noBtn.style.position !== 'absolute') {
                    noBtn.style.position = 'absolute';
                }

                const angle = Math.atan2(centerY - my, centerX - mx);
                const push = 150;
                let newX = rect.left + Math.cos(angle) * push;
                let newY = rect.top + Math.sin(angle) * push;

                // Keep in bounds
                if (newX < 50) newX = window.innerWidth - 150;
                if (newX > window.innerWidth - 150) newX = 50;
                if (newY < 50) newY = window.innerHeight - 100;
                if (newY > window.innerHeight - 100) newY = 50;

                noBtn.style.left = newX + 'px';
                noBtn.style.top = newY + 'px';

                const texts = ["Really? 🥺", "Think again 💔", "Please? 😭", "Don't do it!"];
                noBtn.innerText = texts[Math.floor(Math.random() * texts.length)];
            }
        }

        function createSparkle(x, y) {
            const el = document.createElement('div');
            el.className = 'heart-emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);

            const destX = (Math.random() - 0.5) * 100;
            const destY = (Math.random() - 0.5) * 100 - 50;

            el.animate([
                { transform: `scale(0)`, opacity: 1 },
                { transform: `translate(${destX}px, ${destY}px) scale(1.5)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out' }).onfinish = () => el.remove();
        }

        // --- CELEBRATION ---
        function celebrate() {
            isCelebrating = true;
            document.getElementById('proposal-box').style.opacity = 0;
            document.getElementById('proposal-box').style.pointerEvents = 'none';

            // Music Switch
            if (musicAllowed) {
                fadeOutAudio(introMusic);
                celebMusic.volume = 0;
                celebMusic.play();
                fadeInAudio(celebMusic, 0.6);
            }

            // Show Final Card
            const dialog = document.getElementById('final-dialog');
            dialog.style.opacity = 1;
            dialog.style.pointerEvents = 'auto';
            dialog.style.transform = 'translate(-50%, -50%) scale(1)';

            // Fireworks Loop
            setInterval(() => {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight * 0.5; // Top half
                createFirework(x, y);
            }, 500);
        }

        function fadeOutAudio(audio) {
            const interval = setInterval(() => {
                if (audio.volume > 0.05) audio.volume -= 0.05;
                else {
                    audio.volume = 0;
                    audio.pause();
                    clearInterval(interval);
                }
            }, 200);
        }

        function createFirework(x, y) {
            const count = 30;
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'heart-emoji';
                el.innerText = '✨';
                el.style.left = x + 'px'; el.style.top = y + 'px';
                el.style.zIndex = 15000;
                document.body.appendChild(el);

                const angle = (Math.PI * 2 * i) / count;
                const vel = Math.random() * 200 + 100;
                const tx = Math.cos(angle) * vel;
                const ty = Math.sin(angle) * vel;

                el.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 1500, easing: 'ease-out' }).onfinish = () => el.remove();
            }
        }
    </script>
</body>

</html>
