<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Dharshini ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap');

        :root {
            --primary-love: #ff4d6d;
            --bg-dark: #0a0103;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* --- CURSOR --- */
        #heart-pointer {
            position: fixed;
            top: 0;
            left: 0;
            width: 30px;
            height: 30px;
            z-index: 999999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 10px rgba(255, 62, 108, 0.5));
            animation: heartBeat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes heartBeat {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            15% {
                transform: translate(-50%, -50%) scale(1.25);
            }

            30% {
                transform: translate(-50%, -50%) scale(1);
            }

            45% {
                transform: translate(-50%, -50%) scale(1.15);
            }

            60% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .heart-emoji {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999999;
            font-size: 20px;
            user-select: none;
        }

        @keyframes trailFade {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(50px) scale(0.5);
            }
        }

        /* --- INTRO & MAIN SCENE --- */
        #intro-sequence,
        #main-scene {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .intro-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            opacity: 0;
            position: absolute;
            transition: opacity 1.5s ease;
        }

        #main-scene {
            background: radial-gradient(circle, #4a0e1c 0%, #0a0103 100%);
            opacity: 0;
            transition: opacity 2s ease;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px var(--primary-love);
        }

        /* --- BUTTONS --- */
        .btn {
            padding: 1.2rem 3rem;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #yes-btn {
            background: var(--primary-love);
            color: white;
            box-shadow: 0 0 20px var(--primary-love);
        }

        #no-btn {
            background: white;
            color: black;
            position: absolute;
        }

        /* --- SUCCESS MODAL --- */
        #success-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            display: none;
            z-index: 10000;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .audio-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px;
            border-radius: 50%;
            color: white;
            z-index: 11000;
        }
    </style>
</head>

<body>

    <audio id="intro-music">
        <source src="https://github.com/DINESHSURRYA/junior/raw/main/Enna%20Solla%20Pogirai%20Bgm.mp3"
            type="audio/mpeg">
    </audio>
    <audio id="celebration-music" loop>
        <source
            src="https://github.com/DINESHSURRYA/junior/raw/main/Yen%20Moochavan%20Pechavan%20-%20Oorum%20Blood%20_%20Dude%20_%20Tamil.mp3"
            type="audio/mpeg">
    </audio>

    <div id="heart-pointer">
        <svg viewBox="0 0 32 32" fill="var(--primary-love)">
            <path
                d="M16 28.5L14.1 26.8C7.4 20.7 3 16.7 3 11.8C3 7.8 6.1 4.7 10.1 4.7C12.4 4.7 14.5 5.7 16 7.4C17.5 5.7 19.6 4.7 21.9 4.7C25.9 4.7 29 7.8 29 11.8C29 16.7 24.6 20.7 17.9 26.8L16 28.5Z" />
        </svg>
    </div>

    <div id="music-gateway"
        style="position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: sans-serif;">
        <h1 style="margin-bottom: 20px;">Start Proposal Experience? ❤️</h1>
        <div style="display: flex; gap: 20px;">
            <button onclick="startExperience(true)"
                style="padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #ff3e6c; color: white; border: none; border-radius: 50px;">Play
                with Music 🎵</button>

        </div>
    </div>

    <div id="intro-sequence">
        <div class="intro-text" id="t1">In a world full of people...</div>
        <div class="intro-text" id="t2">There is only one Dharshini...</div>
        <div class="intro-text" id="t3">My only one. ❤️</div>
    </div>

    <div id="main-scene">
        <h1>Will You Be My Valentine, Dharshini?</h1>
        <div style="display:flex; gap: 2rem;">
            <button class="btn" id="yes-btn" onclick="celebrate()">YES</button>
            <button class="btn" id="no-btn">No</button>
        </div>
    </div>

    <div id="success-dialog">
        <h1 style="font-size: 3rem;">Congratulations, Dharshini! 💖</h1>
        <p style="font-size: 1.5rem; margin-top: 1rem;">You've made me the happiest person alive.<br>I love you! ✨</p>
    </div>

    <script>
        const heartPointer = document.getElementById('heart-pointer');
        let music = document.getElementById('intro-music');
        const noBtn = document.getElementById('no-btn');
        let musicAllowed = false;
        const emojis = ['❤️', '💖', '💝', '💗', '💓', '✨'];

        // 1. Pumping Cursor + Emoji Trail
        document.addEventListener('mousemove', (e) => {
            heartPointer.style.left = e.clientX + 'px';
            heartPointer.style.top = e.clientY + 'px';

            if (Math.random() > 0.8) createHeartTrail(e.clientX, e.clientY);
        });

        function createHeartTrail(x, y) {
            const el = document.createElement('div');
            el.className = 'heart-emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            const angle = Math.random() * Math.PI * 2;
            const destX = x + Math.cos(angle) * 50;
            const destY = y + Math.sin(angle) * 50 - 50;
            el.animate([
                { transform: `translate(0,0) scale(0)`, opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(1.5)`, opacity: 0 }
            ], { duration: 1000, fill: 'forwards' }).onfinish = () => el.remove();
        }

        // 2. Intro Sequence
        function startExperience(allow) {
            document.getElementById('music-gateway').style.display = 'none';
            musicAllowed = allow;

            setTimeout(() => showIntro('t1'), 1000);
            setTimeout(() => showIntro('t2'), 4000);
            setTimeout(() => showIntro('t3'), 7000);
            setTimeout(() => startMain(allow), 10000);
        }

        function showIntro(id) {
            const el = document.getElementById(id);
            el.style.opacity = '1';
            setTimeout(() => el.style.opacity = '0', 2500);
        }

        function startMain(allow) {
            document.getElementById('intro-sequence').style.display = 'none';
            document.getElementById('main-scene').style.opacity = '1';
            if (allow) {
                music.play().catch(e => console.log("Music needs interaction"));
                music.volume = 0.5;
            }
        }

        // 3. No Button Escape
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        });

        // 4. Celebration Logic
        function celebrate() {
            if (musicAllowed) {
                music.pause();
                music = document.getElementById('celebration-music');
                music.volume = 0.5;
                music.play();
            }

            const dialog = document.getElementById('success-dialog');
            dialog.style.display = 'block';
            setTimeout(() => {
                dialog.style.opacity = '1';
                dialog.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 50);

            // Fireworks/Confetti effect
            setInterval(createFirework, 300);
        }

        function createFirework() {
            const f = document.createElement('div');
            f.innerHTML = '✨';
            f.style.position = 'fixed';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.top = '100vh';
            f.style.fontSize = '2rem';
            f.style.transition = 'all 2s ease-out';
            document.body.appendChild(f);

            setTimeout(() => {
                f.style.top = Math.random() * 50 + 'vh';
                f.style.opacity = '0';
            }, 100);
            setTimeout(() => f.remove(), 2000);
        }

        function toggleMusic() {
            return music.paused ? music.play() : music.pause();
        }
    </script>
</body>

</html>
