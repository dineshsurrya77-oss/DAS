<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine? ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Prevent scroll during animations */
        }
        .font-romantic {
            font-family: 'Dancing Script', cursive;
        }
        .heart-bg {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 via-red-200 to-pink-300 min-h-screen flex items-center justify-center relative">

    <div id="heartContainer" class="heart-bg"></div>

    <main id="mainCard" class="relative z-10 bg-white/40 backdrop-blur-md p-8 md:p-12 rounded-3xl shadow-2xl border border-white/50 text-center max-w-lg mx-4">
        
        <div id="proposalSection">
            <h1 class="font-romantic text-5xl md:text-7xl text-red-600 mb-6 drop-shadow-sm">
                Will You Be My Valentine?
            </h1>
            <p class="text-gray-700 text-lg mb-10 font-light tracking-wide">
                You make every moment sparkle. <br> I'd love to spend this special day with you.
            </p>

            <div class="flex flex-col sm:flex-row gap-6 justify-center items-center">
                <button id="yesBtn" class="group relative px-10 py-4 bg-red-500 text-white rounded-full font-bold text-xl transition-all hover:bg-red-600 hover:scale-110 active:scale-95 shadow-[0_0_20px_rgba(239,68,68,0.5)]">
                    <span class="relative z-10">YES 💖</span>
                    <div class="absolute inset-0 rounded-full bg-red-400 blur-md opacity-0 group-hover:opacity-60 transition-opacity"></div>
                </button>

                <button id="noBtn" class="px-8 py-3 bg-gray-200 text-gray-500 rounded-full font-medium transition-all hover:bg-gray-300">
                    Maybe? 🥺
                </button>
            </div>
        </div>

        <div id="successMessage" class="hidden">
            <h2 class="font-romantic text-6xl text-red-600 mb-4">Yayyy! ❤️</h2>
            <p class="text-xl text-gray-800">My heart is so happy! <br> I can't wait to see you.</p>
            <div class="mt-6 text-4xl animate-bounce">💍✨</div>
        </div>
    </main>

    <script>
        // 1. Floating Heart Background Animation
        const heartContainer = document.getElementById('heartContainer');
        const hearts = ['❤️', '💖', '💗', '💓', '💕'];

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            heart.className = 'absolute text-red-400/30';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heartContainer.appendChild(heart);

            gsap.to(heart, {
                y: '-110vh',
                x: (Math.random() - 0.5) * 200,
                rotation: Math.random() * 360,
                duration: Math.random() * 10 + 5,
                ease: 'power1.out',
                onComplete: () => heart.remove()
            });
        }

        // Generate background hearts every 800ms
        setInterval(createHeart, 800);

        // 2. Playful "No" Button (Optional: Evasive logic)
        const noBtn = document.getElementById('noBtn');
        noBtn.addEventListener('mouseover', () => {
            gsap.to(noBtn, {
                x: (Math.random() - 0.5) * 300,
                y: (Math.random() - 0.5) * 300,
                duration: 0.3,
                ease: 'power2.out'
            });
        });

        // 3. The "YES" Celebration
        const yesBtn = document.getElementById('yesBtn');
        const mainCard = document.getElementById('mainCard');
        const proposalSection = document.getElementById('proposalSection');
        const successMessage = document.getElementById('successMessage');

        yesBtn.addEventListener('click', () => {
            // A. Trigger Confetti
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            // B. Animate Transition to Success
            gsap.to(proposalSection, {
                opacity: 0,
                scale: 0.8,
                duration: 0.5,
                onComplete: () => {
                    proposalSection.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                    gsap.fromTo(successMessage, 
                        { opacity: 0, y: 50, scale: 0.5 }, 
                        { opacity: 1, y: 0, scale: 1, duration: 0.8, ease: 'back.out(1.7)' }
                    );
                    createSparkleEffect();
                }
            });

            // C. Floating Hearts Burst
            for(let i=0; i<15; i++) {
                setTimeout(createHeart, i * 100);
            }
        });

        // 4. Success Sparkle Effect
        function createSparkleEffect() {
            for (let i = 0; i < 40; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                const size = Math.random() * 6 + 2;
                sparkle.style.width = size + 'px';
                sparkle.style.height = size + 'px';
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.top = Math.random() * 100 + 'vh';
                document.body.appendChild(sparkle);

                gsap.to(sparkle, {
                    opacity: 1,
                    scale: 1.5,
                    duration: Math.random() * 1 + 0.5,
                    repeat: -1,
                    yoyo: true,
                    delay: Math.random() * 2
                });
            }
        }
    </script>
</body>
</html>
