<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cinematic Love Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>

    <style>
        :root {
            --gold: #d4af37;
            --pink: #ff3e6c;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Cinzel', serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- GATEWAY (SOUND CHECK) --- */
        #gateway {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            z-index: 30000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        /* --- CURSOR --- */
        #heart-pointer {
            position: fixed;
            top: 0;
            left: 0;
            width: 30px;
            height: 30px;
            z-index: 999999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 10px rgba(255, 62, 108, 0.5));
            animation: heartBeat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes heartBeat {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            15% {
                transform: translate(-50%, -50%) scale(1.25);
            }

            30% {
                transform: translate(-50%, -50%) scale(1);
            }

            45% {
                transform: translate(-50%, -50%) scale(1.15);
            }

            60% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .heart-emoji {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999999;
            font-size: 20px;
            user-select: none;
        }

        /* --- UI OVERLAYS --- */
        .overlay-ui {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            color: white;
        }

        .intro-text {
            font-size: 2rem;
            letter-spacing: 5px;
            opacity: 0;
            transition: 2s;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            pointer-events: auto;
            text-transform: uppercase;
            margin: 20px;
        }

        #yes-btn {
            background: var(--pink);
            color: white;
            box-shadow: 0 0 30px var(--pink);
        }

        #no-btn {
            background: white;
            color: #333;
            position: relative;
            /* Start relative */
        }

        /* --- CELEBRATION DIALOG --- */
        #final-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 20000;
            text-align: center;
            color: white;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <div id="gateway">
        <h2 style="letter-spacing: 3px; margin-bottom: 30px;">BEGIN THE EXPERIENCE?</h2>
        <div style="display: flex; gap: 20px;">
            <button class="btn" onclick="startApp(true)" style="background: var(--pink); color: white;">Play with Music
                🎵</button>

        </div>
    </div>

    <div id="heart-pointer">
        <svg viewBox="0 0 32 32" fill="var(--pink)">
            <path
                d="M16 28.5L14.1 26.8C7.4 20.7 3 16.7 3 11.8C3 7.8 6.1 4.7 10.1 4.7C12.4 4.7 14.5 5.7 16 7.4C17.5 5.7 19.6 4.7 21.9 4.7C25.9 4.7 29 7.8 29 11.8C29 16.7 24.6 20.7 17.9 26.8L16 28.5Z" />
        </svg>
    </div>

    <div id="canvas-container"></div>

    <div class="overlay-ui" id="ui-layer" style="display:none;">
        <div id="intro-box">
            <p class="intro-text" id="t1">Across galaxies...</p>
            <p class="intro-text" id="t2">Through time...</p>
        </div>
        <div id="proposal-box" style="display:none; pointer-events: auto;">
            <h1 style="font-size: 3rem; margin-bottom: 50px;">Will You Be My Valentine? ❤️</h1>
            <div style="position: relative; height: 100px; width: 300px; display: flex; justify-content: center;">
                <button id="yes-btn" class="btn" onclick="celebrate()">YES</button>
                <button id="no-btn" class="btn">NO</button>
            </div>
        </div>
    </div>

    <div id="final-dialog">
        <h1 style="font-size: 3rem; color: var(--gold);">CONGRATULATIONS! 💍</h1>
        <p style="font-size: 1.2rem; letter-spacing: 2px;">You've made the universe complete.</p>
        <button class="btn" style="background: white; color: black; margin-top: 30px;"
            onclick="location.reload()">Replay Love</button>
    </div>

    <audio id="intro-music">
        <source src="https://github.com/DINESHSURRYA/junior/raw/main/Enna%20Solla%20Pogirai%20Bgm.mp3"
            type="audio/mpeg">
    </audio>
    <audio id="celebration-music" loop>
        <source
            src="https://github.com/DINESHSURRYA/junior/raw/main/Yen%20Moochavan%20Pechavan%20-%20Oorum%20Blood%20_%20Dude%20_%20Tamil.mp3"
            type="audio/mpeg">
    </audio>

    <script>
        let scene, camera, renderer, ring, composer, hearts = [];
        let isCelebrating = false;
        let musicEnabled = false;

        function startApp(playMusic) {
            musicEnabled = playMusic;
            document.getElementById('gateway').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            if (playMusic) {
                const music = document.getElementById('intro-music');
                music.play();
                music.volume = 0.5;
            }
            init3D();
            runIntro();
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 💍 3D Luxury Ring
            const ringGeo = new THREE.TorusGeometry(1, 0.08, 30, 100);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 1, roughness: 0.1 });
            ring = new THREE.Mesh(ringGeo, ringMat);
            scene.add(ring);

            // 💎 Diamond
            const diaGeo = new THREE.OctahedronGeometry(0.28, 0);
            const diaMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x222222, shininess: 100, transparent: true, opacity: 0.8 });
            const diamond = new THREE.Mesh(diaGeo, diaMat);
            diamond.position.y = 1;
            ring.add(diamond);

            // ✨ Bloom (Glow) Effect
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.2;
            bloomPass.strength = 1.2;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Light
            const pLight = new THREE.PointLight(0xffffff, 2);
            pLight.position.set(5, 5, 5);
            scene.add(pLight);
            scene.add(new THREE.AmbientLight(0x404040, 1));

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            ring.rotation.y += 0.01;
            if (isCelebrating) {
                ring.rotation.y += 0.04;
                camera.position.z -= (camera.position.z - 2) * 0.05;
            }
            composer.render();
        }

        // --- CINEMATIC FLOW ---
        function runIntro() {
            setTimeout(() => document.getElementById('t1').style.opacity = 1, 500);
            setTimeout(() => document.getElementById('t2').style.opacity = 1, 3000);
            setTimeout(() => {
                document.getElementById('intro-box').style.display = 'none';
                document.getElementById('proposal-box').style.display = 'block';
            }, 6000);
        }

        // --- CURSOR ENGINE ---
        const heartPointer = document.getElementById('heart-pointer');
        const emojis = ['❤️', '💖', '💝', '💗', '💓', '✨'];

        window.addEventListener('mousemove', (e) => {
            heartPointer.style.left = e.clientX + 'px';
            heartPointer.style.top = e.clientY + 'px';
            if (Math.random() > 0.8) createHeartTrail(e.clientX, e.clientY);

            // Evasive No Button
            const noBtn = document.getElementById('no-btn');
            const rect = noBtn.getBoundingClientRect();
            const d = Math.hypot(e.clientX - (rect.left + 25), e.clientY - (rect.top + 25));
            if (d < 100) {
                noBtn.style.position = 'absolute'; // Fly away
                noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
                noBtn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            }
        });

        function createHeartTrail(x, y) {
            const el = document.createElement('div');
            el.className = 'heart-emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            const angle = Math.random() * Math.PI * 2;
            const destX = x + Math.cos(angle) * 50;
            const destY = y + Math.sin(angle) * 50 - 50;
            el.animate([
                { transform: `translate(0,0) scale(0)`, opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(1.5)`, opacity: 0 }
            ], { duration: 1000, fill: 'forwards' }).onfinish = () => el.remove();
        }

        // --- FINAL CELEBRATION ---
        function celebrate() {
            isCelebrating = true;
            if (musicEnabled) {
                document.getElementById('intro-music').pause();
                const celebMusic = document.getElementById('celebration-music');
                celebMusic.volume = 0.5;
                celebMusic.play();
            }
            document.getElementById('proposal-box').style.display = 'none';
            const dialog = document.getElementById('final-dialog');
            dialog.style.display = 'block';
            setTimeout(() => dialog.style.transform = 'translate(-50%, -50%) scale(1)', 50);

            // Fireworks from 4 corners
            const corners = [[0, 0], [window.innerWidth, 0], [0, window.innerHeight], [window.innerWidth, window.innerHeight]];
            corners.forEach(c => {
                for (let i = 0; i < 30; i++) {
                    setTimeout(() => createFirework(c[0], c[1]), i * 50);
                }
            });
        }

        function createFirework(x, y) {
            const p = document.createElement('div');
            p.className = 'trail-emoji';
            p.innerText = '💖';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            document.body.appendChild(p);
            p.animate([
                { transform: 'translate(0,0)', opacity: 1 },
                { transform: `translate(${(Math.random() - 0.5) * 800}px, ${(Math.random() - 0.5) * 800}px)`, opacity: 0 }
            ], { duration: 2000, easing: 'ease-out' }).onfinish = () => p.remove();
        }
    </script>
</body>

</html>
